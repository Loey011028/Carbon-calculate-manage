<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>碳核算管理平台 - 模块整合</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#1890ff",
            sidebar: "#1e293b",
            surface: "#f7f9fc",
            "outline-variant": "#c0c7d6",
            "on-surface": "#191c1e",
            "on-surface-variant": "#404753"
          },
          fontFamily: {
            sans: ["Inter", "Microsoft YaHei", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: Inter, "Microsoft YaHei", sans-serif;
      background: #f7f9fc;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      vertical-align: middle;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #c0c7d6;
      border-radius: 999px;
    }

    .sidebar-link {
      color: #cbd5e1;
      transition: background-color 160ms ease, color 160ms ease;
    }

    .sidebar-link:hover {
      color: #fff;
      background: #334155;
    }

    .sidebar-link.active {
      color: #fff;
      background: #1890ff;
      font-weight: 600;
    }

    #content-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #f7f9fc;
    }

    .frame-loading #content-frame {
      opacity: 0.35;
    }
  </style>
<script src="./shared-mock-data.js"></script>
</head>
<body class="h-screen overflow-hidden text-on-surface">
  <div class="flex h-full">
    <aside class="w-64 bg-sidebar text-white flex flex-col shrink-0">
      <div class="h-16 flex items-center px-6 gap-3 border-b border-slate-700">
        <i class="fa-solid fa-leaf text-primary text-xl"></i>
        <span class="font-bold text-lg tracking-tight">碳排放管理平台</span>
      </div>

      <nav class="flex-1 overflow-y-auto custom-scrollbar py-4 px-3 space-y-1">
        <a class="flex items-center px-4 py-3 rounded-md text-slate-400 hover:text-white hover:bg-slate-700" href="javascript:void(0)">
          <i class="fa-solid fa-house w-6 text-center mr-3 text-sm"></i>
          首页
        </a>

        <div class="space-y-1">
          <button class="w-full flex items-center justify-between px-4 py-3 text-white bg-slate-800 rounded-md">
            <span class="flex items-center">
              <i class="fa-solid fa-calculator w-6 text-center mr-3 text-sm text-primary"></i>
              碳核算管理
            </span>
            <i class="fa-solid fa-chevron-up text-[10px]"></i>
          </button>

          <div class="pl-10 space-y-1 py-1" id="sidebar-tabs">
            <button class="sidebar-link active block w-full text-left px-4 py-2 rounded-md text-sm" data-key="boundary" type="button">
              核算边界管理
            </button>
            <button class="sidebar-link block w-full text-left px-4 py-2 rounded-md text-sm" data-key="source" type="button">
              排放源管理
            </button>
            <button class="sidebar-link block w-full text-left px-4 py-2 rounded-md text-sm" data-key="datasource" type="button">
              数据源管理
            </button>
            <button class="sidebar-link block w-full text-left px-4 py-2 rounded-md text-sm" data-key="model" type="button">
              核算模型管理
            </button>
            <button class="sidebar-link block w-full text-left px-4 py-2 rounded-md text-sm" data-key="factor" type="button">
              因子库管理
            </button>
            <button class="sidebar-link block w-full text-left px-4 py-2 rounded-md text-sm" data-key="gwp" type="button">
              GWP管理
            </button>
          </div>
        </div>

        <a class="flex items-center justify-between px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-700 rounded-md" href="javascript:void(0)">
          <span class="flex items-center">
            <i class="fa-solid fa-database w-6 text-center mr-3 text-sm"></i>
            碳数据管理
          </span>
          <i class="fa-solid fa-chevron-down text-[10px]"></i>
        </a>
        <a class="flex items-center justify-between px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-700 rounded-md" href="javascript:void(0)">
          <span class="flex items-center">
            <i class="fa-solid fa-chart-line w-6 text-center mr-3 text-sm"></i>
            碳分析与洞察
          </span>
          <i class="fa-solid fa-chevron-down text-[10px]"></i>
        </a>
        <a class="flex items-center justify-between px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-700 rounded-md" href="javascript:void(0)">
          <span class="flex items-center">
            <i class="fa-solid fa-file-invoice w-6 text-center mr-3 text-sm"></i>
            碳报表与披露
          </span>
          <i class="fa-solid fa-chevron-down text-[10px]"></i>
        </a>
      </nav>
    </aside>

    <main class="flex-1 min-w-0 flex flex-col bg-surface">
      <header class="h-16 bg-white border-b border-outline-variant flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
          <i class="fa-solid fa-bars text-slate-500"></i>
          <nav class="flex items-center text-sm gap-2 text-on-surface-variant">
            <span>碳核算管理</span>
            <span class="text-xs text-slate-300">/</span>
            <span class="text-on-surface font-semibold" id="current-title">核算边界管理</span>
            <span class="text-xs text-slate-300 hidden" id="current-subtitle-separator">/</span>
            <span class="text-on-surface font-semibold hidden" id="current-subtitle"></span>
          </nav>
        </div>
        <div class="flex items-center gap-6">
          <div class="relative cursor-pointer">
            <span class="material-symbols-outlined text-slate-500">notifications</span>
            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">12</span>
          </div>
          <div class="flex items-center gap-2 border-l border-slate-200 pl-4 cursor-pointer">
            <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold">管</div>
            <span class="text-sm text-slate-700">管理员</span>
            <span class="material-symbols-outlined text-slate-400 text-[16px]">arrow_drop_down</span>
          </div>
        </div>
      </header>

      <section class="flex-1 min-h-0 relative" id="frame-shell">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none" id="loading-mask">
          <div class="px-4 py-2 rounded bg-white border border-slate-200 shadow-sm text-sm text-slate-500">正在加载模块...</div>
        </div>
        <iframe id="content-frame" title="碳核算管理模块内容"></iframe>
      </section>
    </main>
  </div>

  <script>
    const modules = {
      boundary: {
        title: "核算边界管理",
     
        url: "./boundary.html"
      },
      source: {
        title: "排放源管理",
      
        url: "./source.html"
      },
      datasource: {
        title: "数据源管理",
      
        url: "./datasource.html"
      },
      model: {
        title: "核算模型管理",
      
        url: "./model.html"
      },
      factor: {
        title: "因子库管理",
      
        url: "./factor.html"
      },
      gwp: {
        title: "GWP管理",
       
        url: "./gwp.html"
      }
    };

    const frame = document.getElementById("content-frame");
    const frameShell = document.getElementById("frame-shell");
    const loadingMask = document.getElementById("loading-mask");
    const titleNode = document.getElementById("current-title");
    const subtitleNode = document.getElementById("current-subtitle");
    const subtitleSeparator = document.getElementById("current-subtitle-separator");
    const tabContainer = document.getElementById("sidebar-tabs");
    let currentModuleKey = "boundary";

  function setCurrentSubtitle(title = "") {
  const show = Boolean(title) && ["gwp", "model"].includes(currentModuleKey);

  subtitleNode.textContent = show ? title : "";
  subtitleNode.classList.toggle("hidden", !show);
  subtitleSeparator.classList.toggle("hidden", !show);

  titleNode.classList.toggle("font-semibold", !show);
  titleNode.classList.toggle("text-on-surface", !show);
  titleNode.classList.toggle("text-on-surface-variant", show);

  if (show && currentModuleKey === "model") {
    titleNode.classList.add("cursor-pointer", "hover:text-primary");
    titleNode.dataset.breadcrumbAction = "model-list";
  } else {
    titleNode.classList.remove("cursor-pointer", "hover:text-primary");
    titleNode.removeAttribute("data-breadcrumb-action");
  }
}

    function switchModule(key) {
      currentModuleKey = modules[key] ? key : "boundary";
      const module = modules[currentModuleKey];

      titleNode.textContent = module.title;
      setCurrentSubtitle("");

      tabContainer.querySelectorAll("[data-key]").forEach((button) => {
        button.classList.toggle("active", button.dataset.key === currentModuleKey);
      });

      frameShell.classList.add("frame-loading");
      loadingMask.classList.remove("hidden");
      frame.removeAttribute("srcdoc");
      frame.src = module.url;
      history.replaceState(null, "", "#" + currentModuleKey);
    }


    function installInteractionEnhancements(doc, moduleKey) {
      if (!doc || doc.__integratedInteractionsInstalled) return;
      doc.__integratedInteractionsInstalled = true;

      const moduleLabels = {
        boundary: "核算边界",
        source: "排放源",
        datasource: "数据源",
        model: "核算模型",
        factor: "排放因子",
        gwp: "GWP参数"
      };

      const formFields = {
        boundary: ["类别名称", "核算范围", "负责人", "状态", "说明"],
        source: ["排放源名称", "所属类别", "来源类型", "核算方法", "状态"],
        datasource: ["数据源名称", "数据源类型", "所属组织", "采集频率", "状态"],
        model: ["模型名称", "版本号", "适用边界", "核算方法", "状态"],
        factor: ["因子名称", "因子编码", "因子值", "单位", "来源标准"],
        gwp: ["版本名称/气体名称", "来源标准", "GWP值", "时间尺度", "状态"]
      };

      const textOf = (node) => (node?.textContent || "").replace(/\s+/g, " ").trim();
      const hasAny = (text, words) => words.some((word) => text.includes(word));
      const normalizeFilter = (value) => {
        const normalized = (value || "").replace(/^[^:：]{1,16}[:：\s]*/, "").trim();
        if (!normalized || normalized === "全部" || normalized.includes("全部") || normalized.startsWith("请选择")) return "";
        return normalized;
      };
      const inModal = (node) => !!node.closest('[id*="modal"], [class*="modal"], .fixed.inset-0, #integrated-generic-form');
      const visible = (node) => {
        if (!node) return false;
        const style = doc.defaultView.getComputedStyle(node);
        return style.display !== "none" && style.visibility !== "hidden" && !node.classList.contains("hidden");
      };

      function flash(message) {
        let toast = doc.getElementById("integrated-interaction-toast");
        if (!toast) {
          toast = doc.createElement("div");
          toast.id = "integrated-interaction-toast";
          toast.className = "fixed right-6 bottom-6 z-[9999] bg-slate-900 text-white text-xs px-4 py-2 rounded shadow-lg transition-opacity";
          doc.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = "1";
        clearTimeout(toast.__timer);
        toast.__timer = setTimeout(() => { toast.style.opacity = "0"; }, 1500);
      }

      function ensureNoDataRow(table) {
        let row = table.querySelector("tr[data-integrated-empty]");
        if (!row) {
          const cols = Math.max(1, table.querySelectorAll("thead th").length || table.querySelector("tr")?.children.length || 1);
          row = doc.createElement("tr");
          row.dataset.integratedEmpty = "true";
          row.className = "hidden";
          row.innerHTML = '<td colspan="' + cols + '" class="px-4 py-8 text-center text-slate-400 text-sm">暂无匹配数据</td>';
          table.querySelector("tbody")?.appendChild(row);
        }
        return row;
      }

      function isInPagination(el) {
        return !!el.closest("[data-integrated-pagination], [data-integrated-page-list]");
      }

      function isFilterControl(el) {
        if (!el || inModal(el) || isInPagination(el) || !visible(el)) return false;
        const type = (el.type || "").toLowerCase();
        if (["button", "submit", "reset", "date", "file", "password", "checkbox", "radio", "hidden"].includes(type)) return false;
        if (el.closest("table, tbody, thead, tfoot")) return false;
        if (el.tagName === "SELECT" && /条\s*\/\s*页|条\/页/.test(textOf(el))) return false;
        return true;
      }

      function getFilterControls() {
        return Array.from(doc.querySelectorAll("main input, main select")).filter(isFilterControl);
      }

      function getOriginalRows(table) {
        const body = table.querySelector("tbody");
        if (!body) return [];
        return Array.from(body.querySelectorAll("tr:not([data-integrated-empty])"));
      }

      function getMatchedRows(table) {
        const rows = getOriginalRows(table);
        const terms = getFilterControls().map((el) => normalizeFilter(el.value)).filter(Boolean);
        const category = table.dataset.integratedCategory || "";
        return rows.filter((row) => {
          const text = (row.dataset.integratedSearchText || textOf(row)).toLowerCase();
          return terms.every((term) => text.includes(term.toLowerCase())) && (!category || text.includes(category.toLowerCase()));
        });
      }

      function updatePageButtons(table, totalPages, page) {
        const pageList = table.__integratedPagination?.querySelector("[data-integrated-page-list]");
        if (!pageList) return;
        pageList.innerHTML = "";
        const maxVisible = 7;
        let first = Math.max(1, page - Math.floor(maxVisible / 2));
        let last = Math.min(totalPages, first + maxVisible - 1);
        first = Math.max(1, last - maxVisible + 1);
        for (let pageNo = first; pageNo <= last; pageNo += 1) {
          const button = doc.createElement("button");
          button.type = "button";
          button.dataset.integratedPage = String(pageNo);
          button.className = "w-8 h-8 flex items-center justify-center rounded text-xs " +
            (pageNo === page ? "bg-primary text-on-primary" : "border border-outline-variant hover:bg-surface-variant/10");
          button.textContent = String(pageNo);
          pageList.appendChild(button);
        }
      }

      function applyTableState(table) {
        const body = table.querySelector("tbody");
        if (!body) return;
        const rows = getOriginalRows(table);
        const emptyRow = ensureNoDataRow(table);
        const pageSize = Number(table.dataset.integratedPageSize || 10);
        const matched = getMatchedRows(table);
        const totalPages = Math.max(1, Math.ceil(matched.length / pageSize));
        let page = Number(table.dataset.integratedPage || 1);
        page = Math.min(Math.max(1, page), totalPages);
        table.dataset.integratedPage = String(page);
        table.dataset.integratedTotalPages = String(totalPages);
        rows.forEach((row) => { row.style.display = "none"; });
        matched.slice((page - 1) * pageSize, page * pageSize).forEach((row) => { row.style.display = row.dataset.integratedOriginalDisplay || ""; });
        emptyRow.classList.toggle("hidden", matched.length > 0);
        const pagination = table.__integratedPagination;
        if (!pagination) return;
        const pageInfo = pagination.querySelector("[data-integrated-page-info]");
        if (pageInfo) pageInfo.textContent = "共 " + totalPages + " 页";
        updatePageButtons(table, totalPages, page);
        const goto = pagination.querySelector("[data-integrated-goto]");
        if (goto) goto.value = String(page);
        const prev = pagination.querySelector("[data-integrated-prev]");
        const next = pagination.querySelector("[data-integrated-next]");
        if (prev) prev.disabled = page <= 1;
        if (next) next.disabled = page >= totalPages;
      }

      function setupPagination(table) {
        let container = table.closest(".flex.flex-col, .rounded-xl, .rounded-lg, .border")?.querySelector(".border-t, [class*='pagination']");
        if (!container || (!container.textContent.includes("条") && !container.querySelector("select"))) {
          container = doc.createElement("div");
          container.className = "p-md border-t border-outline-variant flex items-center justify-between text-sm text-outline";
          table.closest(".flex.flex-col, .rounded-xl, .rounded-lg, .border")?.appendChild(container);
        }
        if (!container) return;
        table.__integratedPagination = container;
        container.dataset.integratedPagination = "true";
        const oldSelect = Array.from(container.querySelectorAll("select")).find((select) => /条\s*\/\s*页|条\/页/.test(textOf(select))) || container.querySelector("select");
        const preservedTotal = Array.from(container.children).find((child) => /共\s*\d+\s*条/.test(textOf(child)))?.outerHTML || "";
        const selectHtml = oldSelect ? oldSelect.outerHTML : '<select class="px-2 py-1 border border-outline-variant rounded text-xs"><option>10 条/页</option><option>20 条/页</option><option>50 条/页</option></select>';
        container.innerHTML = [
          '<div class="flex items-center gap-4 min-w-0">', preservedTotal,
          '<span data-integrated-page-info class="whitespace-nowrap">共 1 页</span></div>',
          '<div class="flex items-center space-x-2">',
          '<button type="button" data-integrated-prev class="w-8 h-8 flex items-center justify-center border border-outline-variant rounded hover:bg-surface-variant/10 disabled:opacity-40 disabled:cursor-not-allowed">‹</button>',
          '<span data-integrated-page-list class="flex items-center space-x-2"></span>',
          '<button type="button" data-integrated-next class="w-8 h-8 flex items-center justify-center border border-outline-variant rounded hover:bg-surface-variant/10 disabled:opacity-40 disabled:cursor-not-allowed">›</button>',
          '<span class="ml-4">' + selectHtml + '</span>',
          '<span class="ml-2 whitespace-nowrap">前往</span>',
          '<input data-integrated-goto class="w-10 h-8 text-center border border-outline-variant rounded text-xs p-0 focus:ring-primary" type="text" value="1"/>',
          '<span>页</span></div>'
        ].join("");
        const pageSizeSelect = container.querySelector("select");
        table.dataset.integratedPageSize = String(parseInt(textOf(pageSizeSelect?.options[pageSizeSelect.selectedIndex]), 10) || 10);
        table.dataset.integratedPage = table.dataset.integratedPage || "1";
        container.addEventListener("click", (event) => {
          const pageButton = event.target.closest("[data-integrated-page]");
          if (pageButton) table.dataset.integratedPage = pageButton.dataset.integratedPage;
          else if (event.target.closest("[data-integrated-prev]")) table.dataset.integratedPage = String(Math.max(1, Number(table.dataset.integratedPage || 1) - 1));
          else if (event.target.closest("[data-integrated-next]")) table.dataset.integratedPage = String(Math.min(Number(table.dataset.integratedTotalPages || 1), Number(table.dataset.integratedPage || 1) + 1));
          else return;
          applyTableState(table);
        });
        container.querySelector("[data-integrated-goto]")?.addEventListener("change", (event) => {
          const totalPages = Number(table.dataset.integratedTotalPages || 1);
          table.dataset.integratedPage = String(Math.min(totalPages, Math.max(1, parseInt(event.target.value, 10) || 1)));
          applyTableState(table);
        });
        pageSizeSelect?.addEventListener("change", () => {
          table.dataset.integratedPageSize = String(parseInt(textOf(pageSizeSelect.options[pageSizeSelect.selectedIndex]), 10) || 10);
          table.dataset.integratedPage = "1";
          applyTableState(table);
        });
      }

      function setupTables() {
        Array.from(doc.querySelectorAll("table")).forEach((table) => {
          const body = table.querySelector("tbody");
          if (!body || table.__integratedReady) return;
          table.__integratedReady = true;
          const rows = getOriginalRows(table);
          rows.forEach((row) => {
            row.dataset.integratedOriginalDisplay = row.style.display || "";
            row.dataset.integratedSearchText = textOf(row);
            row.classList.add("cursor-pointer");
            row.addEventListener("click", (event) => {
              if (event.target.closest("button, a, input, select")) return;
              rows.forEach((r) => r.classList.remove("bg-blue-50", "ring-1", "ring-primary/20"));
              row.classList.add("bg-blue-50", "ring-1", "ring-primary/20");
              updateDetailFromRow(row);
            });
          });
          setupPagination(table);
          applyTableState(table);
        });
      }

      function setupFilters() {
        getFilterControls().forEach((control) => {
          if (control.__integratedFilterReady) return;
          control.__integratedFilterReady = true;
          control.addEventListener(control.tagName === "SELECT" ? "change" : "input", () => {
            doc.querySelectorAll("table").forEach((table) => {
              table.dataset.integratedPage = "1";
              applyTableState(table);
            });
          });
        });
        Array.from(doc.querySelectorAll("button")).forEach((button) => {
          if (button.__integratedResetReady) return;
          const label = textOf(button);
          if (!["重置", "清空"].includes(label)) return;
          button.__integratedResetReady = true;
          button.addEventListener("click", () => {
            getFilterControls().forEach((control) => {
              if (control.tagName === "SELECT") control.selectedIndex = 0;
              else control.value = "";
            });
            doc.querySelectorAll("table").forEach((table) => {
              table.dataset.integratedPage = "1";
              table.dataset.integratedCategory = "";
              applyTableState(table);
            });
            flash("筛选条件已重置");
          });
        });
      }

      function setupSelectOptions() {
        const labelFor = (control) => {
          const container = control.closest("label, .space-y-1, .flex, div");
          if (!container) return "";
          const clone = container.cloneNode(true);
          clone.querySelectorAll("select, input, button, table, option").forEach((node) => node.remove());
          return textOf(clone).replace(/[：:]/g, "").trim();
        };
        const matchColumn = (label, headers) => {
          const pairs = [
            ["状态", ["状态", "同步状态", "当前状态", "通信状态"]],
            ["范围", ["范围", "核算范围", "适用边界", "边界"]],
            ["类别", ["类别", "排放类别", "所属类别", "分类"]],
            ["组织", ["组织", "所属组织", "部门", "车间"]],
            ["类型", ["类型", "来源类型", "数据源类型", "异常类型", "操作类型"]],
            ["来源", ["来源", "来源标准", "来源名称"]],
            ["频率", ["频率", "采集频率", "发生频率"]],
            ["方法", ["方法", "核算方法"]],
            ["标准", ["标准", "来源标准"]],
            ["版本", ["版本", "版本号", "版本名称"]],
            ["等级", ["等级", "质量等级"]]
          ];
          const keywords = pairs.find(([key]) => label.includes(key))?.[1] || [label];
          let index = headers.findIndex((header) => keywords.some((keyword) => header.includes(keyword) || keyword.includes(header)));
          if (index < 0 && label) index = headers.findIndex((header) => label.includes(header) || header.includes(label));
          return index;
        };

        getFilterControls().forEach((select) => {
          if (select.tagName !== "SELECT" || select.__integratedOptionsReady) return;
          select.__integratedOptionsReady = true;
          const existing = Array.from(select.options).map((option) => textOf(option)).filter(Boolean);
          if (existing.length > 1 && existing.some((value) => !value.includes("全部") && !value.startsWith("请选择"))) return;

          const label = labelFor(select);
          const optionSet = new Set();
          Array.from(doc.querySelectorAll("table")).forEach((table) => {
            const headers = Array.from(table.querySelectorAll("thead th")).map(textOf);
            const columnIndex = matchColumn(label, headers);
            if (columnIndex < 0) return;
            getOriginalRows(table).forEach((row) => {
              const value = textOf(row.children[columnIndex]);
              if (!value || value.length > 28 || /编辑|删除|详情|查看|操作/.test(value)) return;
              optionSet.add(value);
            });
          });
          if (!optionSet.size) return;

          select.innerHTML = "";
          const first = doc.createElement("option");
          first.value = "";
          first.textContent = existing[0]?.includes("全部") || existing[0]?.startsWith("请选择") ? existing[0] : "全部";
          select.appendChild(first);
          Array.from(optionSet).slice(0, 24).forEach((value) => {
            const option = doc.createElement("option");
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
          });
        });
      }
      function setupCategorySwitching() {
        const candidates = Array.from(doc.querySelectorAll("main .cursor-pointer, main li, main [class*='hover:bg']"))
          .filter((el) => !inModal(el) && !el.closest("tbody"))
          .filter((el) => textOf(el).length > 0 && textOf(el).length < 40);
        candidates.forEach((item) => {
          if (item.__integratedCategoryReady) return;
          item.__integratedCategoryReady = true;
          item.addEventListener("click", (event) => {
            if (event.target.closest("button, input, select, a")) return;
            const label = textOf(item).replace(/[()（）]\d+.*$/, "").replace(/[•·]/g, "").trim();
            if (!label) return;
            const hasMatchingRows = Array.from(doc.querySelectorAll("table tbody tr:not([data-integrated-empty])")).some((row) => textOf(row).includes(label));
            if (!hasMatchingRows) return;
            const scope = item.closest(".rounded-xl, .rounded-lg, .border, aside, main") || doc.body;
            scope.querySelectorAll(".bg-primary\\/10, .bg-primary\\/5, .tree-item-active").forEach((active) => {
              if (active !== item) active.classList.remove("bg-primary/10", "bg-primary/5", "tree-item-active", "text-primary", "font-medium");
            });
            item.classList.add("bg-primary/10", "text-primary", "font-medium");
            doc.querySelectorAll("table").forEach((table) => {
              table.dataset.integratedCategory = label;
              table.dataset.integratedPage = "1";
              applyTableState(table);
            });
          });
        });
      }

      function updateDetailFromRow(row) {
        const cells = Array.from(row.children).map(textOf).filter(Boolean);
        if (!cells.length) return;
        const titleTargets = [doc.getElementById("aside-title"), doc.querySelector("[data-purpose='detail-drawer'] h2, [data-purpose='detail-drawer'] h3"), doc.querySelector("aside h2, aside h3"), doc.querySelector("main h2")].filter(Boolean);
        if (titleTargets[0]) titleTargets[0].textContent = cells[0] + " 详情";
        const detailArea = doc.querySelector("[data-purpose='detail-drawer'], aside.w-80, aside.w-\\[420px\\]");
        if (!detailArea) return;
        const values = detailArea.querySelectorAll("span, p, div");
        let cursor = 1;
        values.forEach((node) => {
          if (cursor >= cells.length) return;
          const current = textOf(node);
          if (current && current.length < 40 && !/[：:*]/.test(current) && !node.querySelector("*")) node.textContent = cells[cursor++];
        });
      }

      function modalIsOpen() {
        return Array.from(doc.querySelectorAll('[id*="modal"], [class*="modal"], .fixed.inset-0, #integrated-generic-form')).some((el) => visible(el));
      }

      function openGenericForm(mode) {
        let overlay = doc.getElementById("integrated-generic-form");
        const label = moduleLabels[moduleKey] || "记录";
        if (!overlay) {
          overlay = doc.createElement("div");
          overlay.id = "integrated-generic-form";
          overlay.className = "fixed inset-0 z-[9998] hidden items-center justify-center bg-black/40";
          const fields = (formFields[moduleKey] || ["名称", "类型", "状态", "说明"]).map((field, index) => {
            if (field.includes("状态")) return '<div class="space-y-1"><label class="text-xs font-medium text-slate-500">' + field + '</label><select class="w-full border border-slate-300 rounded px-3 py-2 text-sm"><option>启用</option><option>停用</option><option>草稿</option></select></div>';
            if (field.includes("说明")) return '<div class="space-y-1 col-span-2"><label class="text-xs font-medium text-slate-500">' + field + '</label><textarea class="w-full border border-slate-300 rounded px-3 py-2 text-sm h-20" placeholder="请输入' + field + '"></textarea></div>';
            return '<div class="space-y-1"><label class="text-xs font-medium text-slate-500">' + field + (index < 2 ? " *" : "") + '</label><input class="w-full border border-slate-300 rounded px-3 py-2 text-sm" placeholder="请输入' + field + '" /></div>';
          }).join("");
          overlay.innerHTML = [
            '<div class="bg-white rounded-lg shadow-2xl w-[640px] max-h-[86vh] overflow-hidden flex flex-col">',
            '<div class="px-6 py-4 border-b flex items-center justify-between bg-slate-50">',
            '<h3 class="text-lg font-bold" data-form-title>新增' + label + '</h3>',
            '<button class="text-slate-400 hover:text-slate-700" data-close-form type="button"><span class="material-symbols-outlined">close</span></button></div>',
            '<div class="p-6 grid grid-cols-2 gap-4 overflow-y-auto">' + fields + '</div>',
            '<div class="px-6 py-4 border-t bg-slate-50 flex justify-end gap-3">',
            '<button class="px-5 py-2 border border-slate-300 rounded text-sm" data-close-form type="button">取消</button>',
            '<button class="px-6 py-2 bg-primary text-white rounded text-sm" data-save-form type="button">保存</button></div></div>'
          ].join("");
          doc.body.appendChild(overlay);
          overlay.querySelectorAll("[data-close-form]").forEach((button) => button.addEventListener("click", () => {
            overlay.classList.add("hidden");
            overlay.classList.remove("flex");
          }));
          overlay.querySelector("[data-save-form]").addEventListener("click", () => {
            overlay.classList.add("hidden");
            overlay.classList.remove("flex");
            flash("已保存" + label);
          });
        }
        overlay.querySelector("[data-form-title]").textContent = (mode === "edit" ? "编辑" : "新增") + label;
        overlay.classList.remove("hidden");
        overlay.classList.add("flex");
      }

      function setupButtons() {
        Array.from(doc.querySelectorAll("button, a")).forEach((button) => {
          if (button.__integratedButtonReady || inModal(button) || isInPagination(button)) return;
          const label = textOf(button);
          if (!label) return;
          button.__integratedButtonReady = true;
          if (hasAny(label, ["查询", "搜索", "筛选"])) {
            button.addEventListener("click", () => {
              doc.querySelectorAll("table").forEach((table) => {
                table.dataset.integratedPage = "1";
                applyTableState(table);
              });
              flash("已按当前条件筛选");
            });
            return;
          }
          if (hasAny(label, ["新增", "添加", "新建", "编辑"])) {
            button.addEventListener("click", () => setTimeout(() => {
              if (!modalIsOpen()) openGenericForm(label.includes("编辑") ? "edit" : "add");
            }, 80));
            return;
          }
          if (hasAny(label, ["详情", "查看"])) {
            button.addEventListener("click", () => {
              const row = button.closest("tr");
              if (row) updateDetailFromRow(row);
              flash("已打开详情");
            });
            return;
          }
          if (hasAny(label, ["导出", "下载"])) {
            button.addEventListener("click", () => flash("已生成导出任务"), true);
            return;
          }
          if (label.includes("删除")) {
            button.addEventListener("click", () => flash("已触发删除确认，演示模式不清除数据"), true);
            return;
          }
          if (hasAny(label, ["启用", "停用", "禁用", "完善", "发布", "复制", "回滚", "对比", "日志", "版本管理"])) {
            button.addEventListener("click", () => flash("已触发" + label.replace(/\s+/g, "")));
          }
        });
      }

      function setupActionDelegation() {
        if (doc.__integratedActionDelegationReady) return;
        doc.__integratedActionDelegationReady = true;
        doc.addEventListener("click", (event) => {
          const target = event.target.closest("button, a");
          if (!target || inModal(target) || isInPagination(target)) return;
          const label = textOf(target);
          if (!label) return;
          if (label.includes("删除")) flash("已触发删除确认，演示模式不清除数据");
          else if (hasAny(label, ["导出", "下载"])) flash("已生成导出任务");
          else if (hasAny(label, ["启用", "停用", "禁用", "完善", "发布", "复制", "回滚", "对比", "日志", "版本管理"])) flash("已触发" + label.replace(/\s+/g, ""));
        }, true);
      }

      function setupInternalTabs() {
        const activate = (tab) => {
          const targetId = tab.getAttribute("data-tab") || tab.getAttribute("data-target") || tab.dataset.target;
          if (!targetId) return;
          const target = targetId.startsWith("#") ? targetId.slice(1) : targetId;
          const group = tab.closest("main, .tabs, .border-b, .flex") || doc;
          group.querySelectorAll(".tab-trigger, [data-tab], [data-target]").forEach((item) => {
            if (!(item instanceof doc.defaultView.HTMLElement)) return;
            const itemTarget = (item.getAttribute("data-tab") || item.getAttribute("data-target") || "").replace(/^#/, "");
            if (!itemTarget) return;
            const active = item === tab;
            item.classList.toggle("active", active);
            item.classList.toggle("text-brand-active", active);
            item.classList.toggle("border-brand-active", active);
            item.classList.toggle("text-gray-500", !active);
            item.classList.toggle("border-transparent", !active);
          });
          doc.querySelectorAll(".tab-pane, [id^='view-'], [data-pane]").forEach((pane) => {
            if (!pane.id && !pane.dataset.pane) return;
            const match = pane.id === target || pane.dataset.pane === target;
            pane.classList.toggle("active", match);
            pane.classList.toggle("hidden", !match && (pane.id?.startsWith("view-") || pane.hasAttribute("data-pane")));
          });
          doc.querySelectorAll("table").forEach((table) => {
            table.dataset.integratedPage = "1";
            applyTableState(table);
          });
        };
        Array.from(doc.querySelectorAll(".tab-trigger, [data-tab], [data-target]")).forEach((tab) => {
          if (tab.__integratedTabReady) return;
          tab.__integratedTabReady = true;
          tab.addEventListener("click", () => activate(tab));
        });
      }

      setupTables();
      setupSelectOptions();
      setupFilters();
      setupCategorySwitching();
      setupButtons();
     
      setupActionDelegation();
      setupInternalTabs();
    }

    function cleanupEmbeddedPage() {
      let doc;
      try {
        doc = frame.contentDocument || frame.contentWindow.document;
      } catch (error) {
        loadingMask.classList.add("hidden");
        frameShell.classList.remove("frame-loading");
        return;
      }

      if (currentModuleKey === "boundary") {
        Array.from(doc.body.childNodes).forEach((node) => {
          if (node.nodeType === Node.TEXT_NODE && node.textContent.includes("```html")) {
            node.remove();
          }
        });
      }

      const style = doc.createElement("style");
      style.textContent = `
        html,
        body {
          margin: 0 !important;
          width: 100% !important;
          height: 100% !important;
          min-height: 100vh !important;
          background: #f7f9fc !important;
        }
        body > main,
        body > div.flex-1,
        body > div.flex-1.flex,
        body > .flex-1 {
          margin-left: 0 !important;
          width: 100% !important;
          max-width: none !important;
        }
        body > main {
          min-height: 100vh !important;
        }
        ${currentModuleKey === "boundary" ? `
        body {
          overflow: hidden !important;
        }
        body > .flex.h-screen,
        body > div.flex.h-screen {
          width: 100% !important;
          height: 100vh !important;
        }
        body > .flex.h-screen > .flex-1,
        body > div.flex.h-screen > .flex-1 {
          width: 100% !important;
          height: 100% !important;
          min-width: 0 !important;
        }
        body > .flex.h-screen main,
        body > div.flex.h-screen main {
          width: 100% !important;
          height: 100% !important;
        }
        ` : ""}
      `;
      doc.head.appendChild(style);
      installInteractionEnhancements(doc, currentModuleKey);

      loadingMask.classList.add("hidden");
      frameShell.classList.remove("frame-loading");
      frame.contentWindow?.postMessage({
        type: "module-activated",
        moduleKey: currentModuleKey
      }, "*");
    }

    tabContainer.addEventListener("click", (event) => {
      const button = event.target.closest("[data-key]");
      if (!button) return;
      switchModule(button.dataset.key);
    });

   window.addEventListener("message", (event) => {
  const data = event.data || {};

  if (data.type === "gwp-location") {
    setCurrentSubtitle(data.pageName || "");
    return;
  }

  if (data.type === "model-location") {
    setCurrentSubtitle(data.pageName || "");
  }
});


    frame.addEventListener("load", cleanupEmbeddedPage);

    switchModule((location.hash || "#boundary").slice(1));
    titleNode.addEventListener("click", () => {
  if (currentModuleKey !== "model") return;
  if (titleNode.dataset.breadcrumbAction !== "model-list") return;

  frame.contentWindow?.postMessage({
    type: "model-navigate",
    view: "list"
  }, "*");

  setCurrentSubtitle("");
});
